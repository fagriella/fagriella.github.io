<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirect - F.AGRIELLA</title>
    <meta name="theme-color" content="#1e3932">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0f1a17;
            color: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 1rem;
        }

        .card {
            background: #1a2e28;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            max-width: 400px;
            width: 100%;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .logo span {
            color: #f59e0b;
        }

        .msg {
            color: #9ca3af;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #374151;
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        a {
            color: #f59e0b;
            text-decoration: none;
            font-size: 0.85rem;
            word-break: break-all;
        }

        a:hover {
            text-decoration: underline;
        }

        .error {
            color: #ef4444;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo"><span>F.</span>AGRIELLA</div>
        <div class="spinner" id="spinner"></div>
        <div class="msg" id="msg">Mengarahkan ke file...</div>
    </div>

    <script>
        (function () {
            var hash = window.location.hash.substring(1);
            if (!hash) {
                document.getElementById('msg').innerHTML = '<span class="error">Link tidak valid.</span><br><br><a href="/">Kembali ke Beranda</a>';
                document.getElementById('spinner').style.display = 'none';
                return;
            }

            // Cek tipe link dari prefix
            var url = '';

            if (hash.startsWith('p:')) {
                // Google Slides/Presentation: p:ID
                var id = hash.substring(2);
                url = 'https://docs.google.com/presentation/d/' + id;
            } else if (hash.startsWith('s:')) {
                // Google Sheets: s:ID
                var id = hash.substring(2);
                url = 'https://docs.google.com/spreadsheets/d/' + id;
            } else if (hash.startsWith('d:')) {
                // Google Docs: d:ID
                var id = hash.substring(2);
                url = 'https://docs.google.com/document/d/' + id;
            } else if (hash.startsWith('http')) {
                // Full URL (fallback)
                url = decodeURIComponent(hash);
            } else {
                // Default: Google Drive file
                url = 'https://drive.google.com/file/d/' + hash + '/view';
            }

            document.getElementById('msg').innerHTML = 'Mengarahkan ke:<br><a href="' + url + '">' + url.substring(0, 60) + '...</a>';

            setTimeout(function () {
                window.location.href = url;
            }, 500);
        })();
    </script>
</body>

</html>
